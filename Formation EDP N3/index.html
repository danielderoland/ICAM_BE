<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Formation N3 EDP/PSE — Icam Toulouse</title>
<style>
/* =========================================================================
   FORMATION N3 EDP/PSE — Design System
   ========================================================================= */
:root{
  --brand:#F39200;--brand-600:#D97E00;--brand-700:#B36C00;
  --brand-soft:rgba(243,146,0,.12);--brand-glow:rgba(243,146,0,.35);
  --n1:#10B981;--n1-soft:rgba(16,185,129,.12);--n1-grad:linear-gradient(135deg,#065F46,#10B981);
  --n2:#3B82F6;--n2-soft:rgba(59,130,246,.12);--n2-grad:linear-gradient(135deg,#1E3A8A,#3B82F6);
  --n3:#F39200;--n3-soft:rgba(243,146,0,.12);--n3-grad:linear-gradient(135deg,#B36C00,#F39200);
  --ax:#8B5CF6;--ax-soft:rgba(139,92,246,.12);--ax-grad:linear-gradient(135deg,#4C1D95,#8B5CF6);
  --bg:#F4F6FB;--bg1:#EEF2FA;--bg2:#F8FAFC;
  --sur:#FFFFFF;--sur2:#F8FAFC;--sur3:#EFF3F9;
  --brd:#E2E8F0;--brd2:#CBD5E1;
  --txt:#0F172A;--txt2:#475569;--txt3:#94A3B8;
  --sh-sm:0 1px 2px rgba(15,23,42,.04),0 1px 3px rgba(15,23,42,.06);
  --sh-md:0 4px 6px rgba(15,23,42,.04),0 10px 20px rgba(15,23,42,.06);
  --sh-lg:0 12px 24px rgba(15,23,42,.08),0 24px 48px rgba(15,23,42,.10);
  --sh-br:0 12px 32px rgba(243,146,0,.28);
  --r:18px;--rsm:12px;--rlg:26px;
  --sw:272px;--th:72px;
  --ease:cubic-bezier(.22,.61,.36,1);
  --font:"Inter","Segoe UI",-apple-system,BlinkMacSystemFont,Arial,sans-serif;
}
[data-theme="dark"]{
  --bg:#0A0F1C;--bg1:#0C1424;--bg2:#0A0F1C;
  --sur:#111A2E;--sur2:#16213A;--sur3:#1B2842;
  --brd:#1E2C49;--brd2:#2A3B5E;--txt:#F1F5F9;--txt2:#A6B4CC;--txt3:#64748B;
  --brand-soft:rgba(243,146,0,.18);--n1-soft:rgba(16,185,129,.16);
  --n2-soft:rgba(59,130,246,.16);--n3-soft:rgba(243,146,0,.18);--ax-soft:rgba(139,92,246,.16);
  --sh-sm:0 1px 2px rgba(0,0,0,.4);--sh-md:0 6px 18px rgba(0,0,0,.45);
  --sh-lg:0 18px 48px rgba(0,0,0,.6);--sh-br:0 12px 32px rgba(243,146,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);color:var(--txt);
  background:radial-gradient(1200px 600px at 100% -10%,var(--brand-soft),transparent 55%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  background-attachment:fixed;min-height:100vh;
  -webkit-font-smoothing:antialiased;line-height:1.5;
  transition:background .4s var(--ease),color .3s var(--ease);}
::selection{background:var(--brand-glow);color:#fff}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{max-width:100%;display:block}
*::-webkit-scrollbar{width:8px;height:8px}
*::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:10px;border:2px solid transparent;background-clip:padding-box}
*::-webkit-scrollbar-track{background:transparent}

/* ===== TOPBAR ===== */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:70;height:var(--th);
  display:flex;align-items:center;gap:16px;padding:0 26px;
  background:color-mix(in srgb,var(--sur) 85%,transparent);
  backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
  border-bottom:1px solid var(--brd);}
.brand-logos{display:flex;align-items:center;gap:12px;flex-shrink:0}
.brand-logos img{height:36px;width:auto;object-fit:contain}
.brand-sep{width:1px;height:26px;background:var(--brd2);flex-shrink:0}
.brand-title{display:flex;flex-direction:column;flex-shrink:0}
.brand-title .mt{font-size:1.02rem;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.brand-title .st{font-size:.64rem;font-weight:700;letter-spacing:.14em;color:var(--brand);text-transform:uppercase}
.tab-nav{display:flex;align-items:center;gap:4px;background:var(--sur2);border:1px solid var(--brd);border-radius:14px;padding:4px;margin:0 auto}
.tb{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;
  font-size:.86rem;font-weight:700;color:var(--txt2);transition:all .25s var(--ease);white-space:nowrap}
.tb svg{flex-shrink:0}
.tb:hover{background:var(--sur3);color:var(--txt)}
.tb.active{background:var(--brand);color:#fff;box-shadow:var(--sh-br)}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.icon-btn{width:42px;height:42px;border-radius:11px;background:var(--sur2);border:1px solid var(--brd);
  display:grid;place-items:center;color:var(--txt2);transition:all .2s var(--ease)}
.icon-btn:hover{color:var(--brand);border-color:var(--brand)}
.moon{display:none}
[data-theme="dark"] .sun{display:none}[data-theme="dark"] .moon{display:block}
.menu-btn{display:none;width:42px;height:42px;border-radius:11px;background:var(--sur2);
  border:1px solid var(--brd);align-items:center;justify-content:center;flex-shrink:0}

/* ===== LAYOUT ===== */
.app-body{display:flex;padding-top:var(--th);min-height:100vh}
.tab-panel{display:none;flex:1;min-width:0}
.tab-panel.active{display:flex}
.sidebar{width:var(--sw);flex-shrink:0;position:sticky;top:var(--th);
  height:calc(100vh - var(--th));overflow-y:auto;background:var(--sur);
  border-right:1px solid var(--brd);display:flex;flex-direction:column}
.nav{flex:1;overflow-y:auto;padding:14px 10px}
.nl{font-size:.64rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--txt3);padding:12px 12px 5px}
.ni{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:10px;
  color:var(--txt2);font-size:.86rem;font-weight:600;text-align:left;
  transition:all .2s var(--ease);position:relative;cursor:pointer}
.ni .ic{width:18px;height:18px;flex-shrink:0;display:grid;place-items:center;
  color:var(--txt3);transition:color .2s}
.ni .badge{margin-left:auto;font-size:.66rem;font-weight:700;color:var(--txt3);
  background:var(--sur3);padding:2px 7px;border-radius:20px}
.ni:hover{background:var(--sur2);color:var(--txt)}
.ni:hover .ic{color:var(--brand)}
.ni.active{background:var(--brand-soft);color:var(--brand)}
.ni.active .ic{color:var(--brand)}
.ni.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:60%;background:var(--brand);border-radius:0 3px 3px 0}
.ni.n1.active{background:var(--n1-soft);color:var(--n1)}
.ni.n1.active .ic,.ni.n1.active::before{color:var(--n1);background:var(--n1)}
.ni.n2.active{background:var(--n2-soft);color:var(--n2)}
.ni.n2.active .ic,.ni.n2.active::before{color:var(--n2);background:var(--n2)}
.ni.n3.active{background:var(--n3-soft);color:var(--n3)}
.ni.n3.active .ic,.ni.n3.active::before{color:var(--n3);background:var(--n3)}
.ni.ax.active{background:var(--ax-soft);color:var(--ax)}
.ni.ax.active .ic,.ni.ax.active::before{color:var(--ax);background:var(--ax)}
.sf{padding:14px 16px;border-top:1px solid var(--brd);font-size:.7rem;color:var(--txt3);line-height:1.7}
.sf strong{color:var(--txt2);font-weight:700}

/* ===== CONTENT ===== */
.content{flex:1;min-width:0;padding:32px 28px 70px;max-width:1260px;margin:0 auto;width:100%}

/* ===== HERO ===== */
.hero{position:relative;overflow:hidden;border-radius:var(--rlg);color:#fff;
  padding:38px 42px;margin-bottom:28px;box-shadow:var(--sh-lg);isolation:isolate}
.hero-n2{background:linear-gradient(135deg,#16233F 0%,#0F1A30 60%,#13294A 100%)}
.hero-n3{background:linear-gradient(135deg,#3B1700 0%,#1C0900 60%,#2D1200 100%)}
.hero::before{content:"";position:absolute;inset:0;z-index:-1;
  background:radial-gradient(600px 300px at 88% -20%,rgba(243,146,0,.5),transparent 60%),
    radial-gradient(500px 400px at 10% 120%,rgba(59,130,246,.3),transparent 55%)}
.hero::after{content:"";position:absolute;right:-60px;top:-60px;width:280px;height:280px;z-index:-1;
  background:conic-gradient(from 0deg,transparent,rgba(255,255,255,.05),transparent);
  border-radius:50%;animation:spin 24s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.h-badge{display:inline-flex;align-items:center;gap:7px;font-size:.7rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:#FFD3BC;
  background:rgba(243,146,0,.18);border:1px solid rgba(243,146,0,.4);
  padding:5px 12px;border-radius:30px;margin-bottom:16px}
.h-badge .dot{width:6px;height:6px;border-radius:50%;background:#F39200;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(243,146,0,.7)}50%{box-shadow:0 0 0 5px transparent}}
.hero h1{font-size:clamp(1.5rem,2.8vw,2.3rem);font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:12px}
.hero h1 span{background:linear-gradient(90deg,#F39200,#FAC04A);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{max-width:560px;color:#C7D2E8;font-size:.95rem;line-height:1.65}
.h-meta{display:flex;flex-wrap:wrap;gap:9px;margin-top:20px}
.h-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.18);border-radius:30px;padding:6px 12px;
  font-size:.78rem;font-weight:600;color:rgba(255,255,255,.9);backdrop-filter:blur(4px)}
.h-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.hbtn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:11px;
  font-size:.86rem;font-weight:700;transition:all .22s var(--ease);cursor:pointer;border:none;font-family:var(--font)}
.hbtn-g{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25)}
.hbtn-g:hover{background:rgba(255,255,255,.2);transform:translateY(-2px)}
.hbtn-p{background:#F39200;color:#fff;box-shadow:0 6px 20px rgba(243,146,0,.4)}
.hbtn-p:hover{background:#D97E00;transform:translateY(-2px)}

/* ===== FILTERS ===== */
.filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:22px}
.fc{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:30px;
  font-size:.82rem;font-weight:600;background:var(--sur);border:1px solid var(--brd);
  color:var(--txt2);transition:all .2s var(--ease);cursor:pointer}
.fc:hover{border-color:var(--brd2);transform:translateY(-1px)}
.fc.active{color:#fff;border-color:transparent;box-shadow:var(--sh-md)}
.fc.active[data-lvl="all"]{background:linear-gradient(135deg,#1E293B,#334155)}
.fc.active[data-lvl="n1"]{background:var(--n1)}
.fc.active[data-lvl="n2"]{background:var(--n2)}
.fc.active[data-lvl="n3"]{background:var(--n3)}
.fc.active[data-lvl="ax"]{background:var(--ax)}
.fc .dot{width:7px;height:7px;border-radius:50%;background:var(--txt3)}
.fc[data-lvl="n1"] .dot{background:var(--n1)}.fc[data-lvl="n2"] .dot{background:var(--n2)}
.fc[data-lvl="n3"] .dot{background:var(--n3)}.fc[data-lvl="ax"] .dot{background:var(--ax)}
.fc.active .dot{background:#fff!important}

/* ===== CHAPTER CARDS ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);
  padding:20px;cursor:pointer;overflow:hidden;position:relative;
  transition:transform .3s var(--ease),box-shadow .3s var(--ease),border-color .3s;
  display:flex;flex-direction:column;animation:ci .45s var(--ease) backwards}
@keyframes ci{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.card::after{content:"";position:absolute;left:0;top:0;height:100%;width:4px;
  background:var(--ca);transform:scaleY(0);transform-origin:top;transition:transform .35s var(--ease)}
.card:hover{transform:translateY(-5px);box-shadow:var(--sh-lg);border-color:var(--ca)}
.card:hover::after{transform:scaleY(1)}
.card[data-lvl="n1"]{--ca:var(--n1);--cas:var(--n1-soft)}
.card[data-lvl="n2"]{--ca:var(--n2);--cas:var(--n2-soft)}
.card[data-lvl="n3"]{--ca:var(--n3);--cas:var(--n3-soft)}
.card[data-lvl="ax"]{--ca:var(--ax);--cas:var(--ax-soft)}
.card-hd{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.card-ic{width:46px;height:46px;border-radius:13px;flex-shrink:0;display:grid;place-items:center;
  color:var(--ca);background:var(--cas);transition:transform .3s var(--ease)}
.card:hover .card-ic{transform:scale(1.1) rotate(-4deg)}
.card-num{font-size:.64rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ca);margin-bottom:2px}
.card-title{font-size:.98rem;font-weight:750;letter-spacing:-.01em;line-height:1.25;color:var(--txt)}
.lvl-badge{position:absolute;top:16px;right:16px;font-size:.62rem;font-weight:700;
  padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;
  color:#fff;background:var(--ca)}
.card-desc{color:var(--txt2);font-size:.86rem;line-height:1.55;flex:1}
.card-ft{display:flex;align-items:center;gap:7px;margin-top:14px;flex-wrap:wrap}
.mini-tag{font-size:.68rem;font-weight:600;color:var(--txt2);background:var(--sur2);
  border:1px solid var(--brd);padding:3px 8px;border-radius:7px}
.cta{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-size:.78rem;
  font-weight:700;color:var(--ca);transition:gap .2s}
.card:hover .cta{gap:8px}
.empty-st{display:none;text-align:center;padding:60px 20px;color:var(--txt3)}
.empty-st svg{margin-bottom:12px;opacity:.5}
.empty-st h3{color:var(--txt2);font-weight:700;margin-bottom:5px}

/* ===== ACCORDION (Tab 2) ===== */
.acc-block{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);
  overflow:hidden;margin-bottom:14px;transition:box-shadow .3s}
.acc-block:hover{box-shadow:var(--sh-md)}
.acc-hd{display:flex;align-items:center;gap:14px;padding:20px 22px;cursor:pointer;
  transition:background .2s;user-select:none}
.acc-hd:hover{background:var(--sur2)}
.acc-hd.open{background:var(--sur2);border-bottom:1px solid var(--brd)}
.acc-icon{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;flex-shrink:0}
.acc-num{font-size:.64rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.acc-title{font-size:1.02rem;font-weight:750;color:var(--txt)}
.acc-desc{font-size:.84rem;color:var(--txt2);margin-top:2px}
.acc-chev{color:var(--txt3);transition:transform .3s var(--ease);flex-shrink:0;margin-left:auto}
.acc-block.open .acc-chev{transform:rotate(180deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .5s var(--ease)}
.acc-block.open .acc-body{max-height:5000px}
.sec-list{padding:18px 22px;display:grid;gap:12px}
.sec-item{background:var(--sur2);border:1px solid var(--brd);border-radius:var(--rsm);padding:16px 18px}
.sec-item-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sec-num{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;
  font-size:.76rem;font-weight:800;color:#fff;flex-shrink:0}
.sec-title{font-size:.96rem;font-weight:700;color:var(--txt)}
.sec-obj{font-size:.86rem;color:var(--txt2);font-style:italic;line-height:1.55;
  margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--brd)}
.sec-obj strong{color:var(--txt);font-style:normal;font-weight:700}
.sec-cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:8px}
.sec-col{background:var(--sur);border:1px solid var(--brd);border-radius:10px;padding:12px 14px}
.sec-col-ttl{font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--txt3);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.sec-col ul{list-style:none;display:grid;gap:5px}
.sec-col li{font-size:.84rem;color:var(--txt2);display:flex;gap:7px;align-items:flex-start;line-height:1.45}
.sec-col li::before{content:"›";font-weight:700;flex-shrink:0;margin-top:1px}
.n1-li::before{color:var(--n1)}.n2-li::before{color:var(--n2)}
.n3-li::before{color:var(--n3)}.ax-li::before{color:var(--ax)}

/* ===== N3 INTRO CARD ===== */
.intro-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);
  padding:22px 26px;margin-bottom:22px;display:flex;gap:18px;align-items:flex-start}
.intro-ic{width:52px;height:52px;border-radius:14px;background:var(--n3-soft);color:var(--n3);
  display:grid;place-items:center;flex-shrink:0}
.intro-body h3{font-size:1.1rem;font-weight:800;margin-bottom:6px}
.intro-body p{color:var(--txt2);font-size:.9rem;line-height:1.6}
.intro-stats{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.istat{background:var(--sur2);border:1px solid var(--brd);border-radius:11px;padding:10px 16px;min-width:100px}
.istat .n{font-size:1.5rem;font-weight:800;color:var(--n3);line-height:1}
.istat .l{font-size:.72rem;color:var(--txt3);margin-top:3px;font-weight:600}

/* ===== ANNEXES ===== */
.ann-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:18px}
.ann-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rsm);
  padding:16px 18px;transition:all .25s var(--ease)}
.ann-card:hover{transform:translateY(-3px);box-shadow:var(--sh-md);border-color:var(--ax)}
.ann-hd{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ann-letter{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;
  background:var(--ax-soft);color:var(--ax);font-size:.95rem;font-weight:800;flex-shrink:0}
.ann-title{font-size:.93rem;font-weight:700;color:var(--txt)}
.ann-desc{font-size:.82rem;color:var(--txt2);line-height:1.5}
.ann-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.ann-tag{font-size:.7rem;font-weight:600;background:var(--sur2);border:1px solid var(--brd);
  padding:2px 8px;border-radius:6px;color:var(--txt2)}

/* ===== MODAL ===== */
.modal-ov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:rgba(8,12,22,.6);backdrop-filter:blur(8px);
  opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;padding:20px}
.modal-ov.open{opacity:1;visibility:visible}
.modal{background:var(--sur);width:100%;max-width:700px;max-height:90vh;overflow-y:auto;
  border-radius:22px;box-shadow:var(--sh-lg);
  transform:translateY(20px) scale(.97);opacity:0;transition:transform .4s var(--ease),opacity .3s}
.modal-ov.open .modal{transform:none;opacity:1}
.m-banner{position:relative;padding:26px 30px 22px;color:#fff;overflow:hidden}
.m-banner::before{content:"";position:absolute;inset:0;z-index:0;background:var(--mb)}
.m-banner::after{content:"";position:absolute;right:-30px;bottom:-50px;width:180px;height:180px;z-index:0;
  background:radial-gradient(circle,rgba(255,255,255,.14),transparent 70%);border-radius:50%}
.m-banner>*{position:relative;z-index:1}
.m-close{position:absolute;top:14px;right:14px;z-index:3;width:36px;height:36px;border-radius:9px;
  background:rgba(255,255,255,.16);color:#fff;display:grid;place-items:center;transition:all .2s}
.m-close:hover{background:rgba(255,255,255,.28);transform:rotate(90deg)}
.m-ic{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.16);
  display:grid;place-items:center;margin-bottom:12px}
.m-lvl{font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.85;margin-bottom:5px}
.m-banner h2{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.m-banner .sub{margin-top:8px;color:rgba(255,255,255,.85);font-size:.9rem;line-height:1.55}
.m-body{padding:24px 30px 28px}
.mb-s{margin-bottom:22px}
.mb-s:last-child{margin-bottom:0}
.mb-ttl{display:flex;align-items:center;gap:7px;font-size:.7rem;font-weight:800;
  letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-bottom:10px}
.mb-ttl svg{color:var(--acc,var(--brand))}
.mb-text{color:var(--txt2);font-size:.92rem;line-height:1.65}
.mb-list{list-style:none;display:grid;gap:8px}
.mb-list li{display:flex;gap:9px;align-items:flex-start;color:var(--txt);font-size:.9rem;line-height:1.5;
  background:var(--sur2);border:1px solid var(--brd);border-radius:10px;padding:10px 12px}
.mb-list li svg{flex-shrink:0;margin-top:1px;color:var(--acc,var(--brand))}
.mb-kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px}
.mb-kv .kv{background:var(--sur2);border:1px solid var(--brd);border-radius:10px;padding:11px 13px}
.mb-kv .kv .k{font-size:.66rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--txt3);margin-bottom:4px}
.mb-kv .kv .v{font-size:.88rem;font-weight:600;color:var(--txt)}
.btn-row{display:flex;gap:9px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:11px;
  font-size:.86rem;font-weight:700;transition:all .22s var(--ease);cursor:pointer;font-family:var(--font);border:none}
.btn-p{background:var(--brand);color:#fff;box-shadow:var(--sh-br)}
.btn-p:hover{background:var(--brand-600);transform:translateY(-2px)}
.btn-g{background:var(--sur2);color:var(--txt);border:1px solid var(--brd)}
.btn-g:hover{border-color:var(--brand);color:var(--brand);transform:translateY(-2px)}

/* ===== PDF VIEWER ===== */
.pdf-ov{position:fixed;inset:0;z-index:110;display:flex;align-items:center;justify-content:center;
  background:rgba(8,12,22,.65);backdrop-filter:blur(8px);
  opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;padding:18px}
.pdf-ov.open{opacity:1;visibility:visible}
.pdf-modal{background:var(--sur);width:100%;max-width:920px;height:90vh;border-radius:18px;
  box-shadow:var(--sh-lg);display:flex;flex-direction:column;overflow:hidden;
  transform:translateY(16px) scale(.97);opacity:0;transition:transform .4s var(--ease),opacity .3s}
.pdf-ov.open .pdf-modal{transform:none;opacity:1}
.pdf-hd{display:flex;align-items:center;justify-content:space-between;
  padding:13px 20px;border-bottom:1px solid var(--brd);flex-shrink:0}
.pdf-ttl{font-size:.93rem;font-weight:700}
.pdf-close{width:35px;height:35px;border-radius:9px;background:var(--sur2);border:1px solid var(--brd);
  display:grid;place-items:center;color:var(--txt2);transition:all .2s}
.pdf-close:hover{background:var(--brand-soft);color:var(--brand);border-color:var(--brand)}
.pdf-body{flex:1;overflow:hidden;background:var(--sur2)}
.pdf-frame{width:100%;height:100%;border:none;display:block}

/* ===== SECTION TITLE ===== */
.sect-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px;margin-top:28px}
.sect-hd:first-child{margin-top:0}
.sect-hd h2{font-size:1.25rem;font-weight:800;letter-spacing:-.02em}
.sect-hd .lv-pill{font-size:.68rem;font-weight:700;padding:4px 10px;border-radius:20px;
  color:#fff;text-transform:uppercase;letter-spacing:.06em}
.lv-n1{background:var(--n1)}.lv-n2{background:var(--n2)}.lv-n3{background:var(--n3)}.lv-ax{background:var(--ax)}

/* ===== BACKDROP ===== */
.backdrop{position:fixed;inset:0;background:rgba(8,12,22,.5);z-index:65;opacity:0;visibility:hidden;transition:.3s}
.backdrop.show{opacity:1;visibility:visible}

/* ===== RESPONSIVE ===== */
@media(max-width:1040px){
  :root{--sw:260px}
  .sidebar{position:fixed;top:var(--th);left:0;bottom:0;z-index:60;
    transform:translateX(-100%);transition:transform .35s var(--ease)}
  .sidebar.open{transform:none;box-shadow:var(--sh-lg)}
  .tab-panel.active{flex-direction:column}
  .content{padding:22px 18px 60px}
  .menu-btn{display:flex}
}
@media(max-width:680px){
  .topbar{padding:0 14px;gap:10px}
  .tab-nav{display:none}
  .brand-title{display:none}
  .hero{padding:24px 20px}
  .content{padding:16px 12px 50px}
  .m-body{padding:16px 18px 22px}
  .m-banner{padding:20px 22px 16px}
  .grid{grid-template-columns:1fr}
  .mobile-tabs{display:flex!important}
  body{padding-bottom:64px}
}
.mobile-tabs{display:none;position:fixed;bottom:0;left:0;right:0;z-index:80;
  background:var(--sur);border-top:1px solid var(--brd);padding:6px 8px;gap:6px}
.mobile-tabs .tb{flex:1;flex-direction:column;gap:3px;padding:7px 6px;font-size:.72rem;
  border-radius:10px;text-align:center;justify-content:center}
.mobile-tabs .tb svg{margin:0 auto}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ===== MINIMAL DOC LAYOUT ===== */
.page-hd{margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--brd)}
.page-hd h1{font-size:clamp(1.15rem,2vw,1.6rem);font-weight:800;letter-spacing:-.03em;color:var(--txt);margin-bottom:6px;line-height:1.2}
.page-hd>p{color:var(--txt2);font-size:.88rem;line-height:1.65;max-width:620px;margin-bottom:12px}
.page-hd-links{display:flex;gap:8px;flex-wrap:wrap}
.doc-link{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;
  font-size:.82rem;font-weight:600;background:var(--sur2);border:1px solid var(--brd);
  color:var(--txt2);cursor:pointer;font-family:var(--font);transition:all .18s var(--ease);text-decoration:none}
.doc-link:hover{border-color:var(--brd2);color:var(--txt);background:var(--sur3)}
.sect-ttl{font-size:1.05rem;font-weight:800;letter-spacing:-.02em;color:var(--txt);
  margin:28px 0 6px;padding-top:22px;border-top:1px solid var(--brd)}
.content>.page-hd+.sect-ttl,.sect-ttl:first-child{margin-top:0;padding-top:0;border-top:none}
.ssect-ttl{font-size:.9rem;font-weight:700;color:var(--txt2);margin:16px 0 5px;letter-spacing:-.01em}
.sect-sub{color:var(--txt2);font-size:.87rem;line-height:1.65;margin-bottom:14px;max-width:620px}
.ch-list{list-style:none;display:grid;margin-bottom:12px;padding:0}
.ch-link{display:flex;align-items:center;width:100%;padding:7px 10px;border-radius:7px;
  font-size:.87rem;color:var(--txt2);background:none;border:none;cursor:pointer;
  font-family:var(--font);text-align:left;transition:background .15s}
.ch-link:hover{background:var(--sur2);color:var(--txt)}
.ann-dl{margin-bottom:24px;border-top:1px solid var(--brd)}
.ann-dl dt{font-size:.91rem;font-weight:700;color:var(--txt);padding:11px 0 2px;border-bottom:none}
.ann-dl dd{font-size:.83rem;color:var(--txt2);line-height:1.55;margin:0 0 0 14px}
.ann-dl dd+dt{border-top:1px solid var(--brd)}
.dd-tags{display:flex;flex-wrap:wrap;gap:4px;margin:5px 0 10px 14px!important}
.acc-group{display:grid;gap:8px;margin-bottom:10px}
</style>
</head>

function renderSecItem(s, color) {
  const cls = color === 'var(--n3)' ? 'n3-li' : color === 'var(--n2)' ? 'n2-li' : color === 'var(--n1)' ? 'n1-li' : 'n3-li';
  let cols = '';

  if (s.elements && s.elements.length) {
    cols += `<div class="sec-col">
      <div class="sec-col-ttl">${icon('check',13)} Éléments à intégrer</div>
      <ul>${s.elements.map(e=>`<li class="${cls}">${e}</li>`).join('')}</ul>
    </div>`;
  }
  if (s.visuals && s.visuals.length) {
    cols += `<div class="sec-col">
      <div class="sec-col-ttl">${icon('eye',13)} Visuels / Schémas</div>
      <ul>${s.visuals.map(v=>`<li class="${cls}">${v}</li>`).join('')}</ul>
    </div>`;
  }
  if (s.technical && s.technical.length) {
    cols += `<div class="sec-col">
      <div class="sec-col-ttl">${icon('cpu',13)} Informations techniques</div>
      <ul>${s.technical.map(t=>`<li class="${cls}">${t}</li>`).join('')}</ul>
    </div>`;
  }
  if (s.questions && s.questions.length) {
    cols += `<div class="sec-col">
      <div class="sec-col-ttl">${icon('bulb',13)} Questions clés</div>
      <ul>${s.questions.map(q=>`<li class="${cls}">${q}</li>`).join('')}</ul>
    </div>`;
  }

  return `<div class="sec-item">
    <div class="sec-item-hd">
      <div class="sec-num" style="background:${color}">${s.num}</div>
      <div class="sec-title">${s.title}</div>
    </div>
    <div class="sec-obj"><strong>Objectif :</strong> ${s.obj}</div>
    ${cols ? `<div class="sec-cols">${cols}</div>` : ''}
  </div>`;
}

  let h = `<div class="m-banner" style="--mb:${mb}">

  h += `<div class="mb-s"><div class="mb-ttl">${icon('target',15)} Objectif</div>

  h += `<div class="mb-s"><div class="mb-ttl">${icon('check',15)} Éléments à intégrer</div>
    <ul class="mb-list">${ch.elements.map(e=>`<li>${icon('check',15)}<span>${e}</span></li>`).join('')}</ul></div>`;

  if (ch.visuals && ch.visuals.length) {
    h += `<div class="mb-s"><div class="mb-ttl">${icon('eye',15)} Visuels / Schémas à prévoir</div>
      <ul class="mb-list">${ch.visuals.map(v=>`<li>${icon('eye',15)}<span>${v}</span></li>`).join('')}</ul></div>`;
  }

  // Sub-sections
  h += `<div class="mb-s"><div class="mb-ttl">${icon('layers',15)} Sous-sections (${ch.subs.length})</div>
    <div class="mb-kv">${ch.subs.map(s=>`<div class="kv"><div class="k">${s.num}</div><div class="v">${s.title}</div></div>`).join('')}</div></div>`;

  h += `<div class="mb-s"><div class="btn-row">
    <button class="btn btn-g" id="mCloseBtn">${icon('x',15)} Fermer</button>
  </div></div>`;

  h += `</div>`;

  const modal = document.getElementById('modal');
  modal.innerHTML = h;
  document.getElementById('modalOv').classList.add('open');
  document.body.style.overflow = 'hidden';
  modal.scrollTop = 0;
  document.getElementById('mClose').onclick = closeModal;
  document.getElementById('mCloseBtn').onclick = closeModal;
}

function closeModal() {
  document.getElementById('modalOv').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('modalOv').addEventListener('click', e => { if(e.target===document.getElementById('modalOv')) closeModal(); });

}
function closePDF() {
  document.getElementById('pdfOv').classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(()=>{ document.getElementById('pdfFrame').src=''; }, 350);
}
document.getElementById('pdfClose').onclick = closePDF;
document.getElementById('pdfOv').addEventListener('click', e => { if(e.target===document.getElementById('pdfOv')) closePDF(); });

/* =========================================================================
   TAB SWITCH
   ========================================================================= */
let activeTab = '1';
function switchTab(tab) {
  if (tab === activeTab) return;
  activeTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel'+tab).classList.add('active');
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  window.scrollTo(0,0);
}
document.getElementById('tabNav').addEventListener('click', e => {
  const b = e.target.closest('.tb'); if(b) switchTab(b.dataset.tab);
});
document.getElementById('mobileTabs').addEventListener('click', e => {
  const b = e.target.closest('.tb'); if(b) switchTab(b.dataset.tab);
});

/* =========================================================================
   MOBILE SIDEBAR
   ========================================================================= */
function closeSidebar() {
  document.querySelectorAll('.sidebar').forEach(s=>s.classList.remove('open'));
  document.getElementById('backdrop').classList.remove('show');
}

function goToChapter(chId) {
  if (!CHAPTERS.find(c=>c.id===chId)) return;
  switchTab('1');
  setTimeout(()=>{
    const el = document.getElementById('ch-'+chId);
    if (el) {
      if (!el.classList.contains('open')) {
        el.classList.add('open');
        el.querySelector('.acc-hd').classList.add('open');
      }
      el.scrollIntoView({behavior:'smooth',block:'start'});
    }
  },150);
}
document.getElementById('menuBtn').addEventListener('click', () => {
  const sid = activeTab === '1' ? 'sidebar1' : 'sidebar2';
  document.getElementById(sid).classList.add('open');
  document.getElementById('backdrop').classList.add('show');
});
document.getElementById('backdrop').addEventListener('click', closeSidebar);

/* =========================================================================
   THEME
   ========================================================================= */
const saved = localStorage.getItem('formation-theme');
if (saved) document.documentElement.dataset.theme = saved;
document.getElementById('themeBtn').onclick = () => {
  const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = t;
  localStorage.setItem('formation-theme', t);
};

/* =========================================================================
   KEYBOARD
   ========================================================================= */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('pdfOv').classList.contains('open')) closePDF();
    else if (document.getElementById('modalOv').classList.contains('open')) closeModal();
    else closeSidebar();
  }
});

/* =========================================================================
   INIT
   ========================================================================= */
renderTab1();
renderTab2();
</script>
</body>
</html>
